version: '3.1'

services:
  redis:
    image: valkey/valkey:alpine3.23
    ports:
      - 6379:6379
    volumes:
      - redis_store:/data
    command: redis-server --save 60 1 --loglevel warning
    depends_on:
      - auth
    restart: unless-stopped

  auth:
    image: flamerox16/oidc:latest
    ports:
      - 3000:3000
    environment:
      PORT: 3000
      mongo_URI: mongodb://host.docker.internal:27017/auth_server
    restart: unless-stopped

volumes:
  redis_store: